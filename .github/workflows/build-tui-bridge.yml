name: Build tui-bridge

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-tui-bridge
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-gcc
      - name: Build (Windows)
        run: |
          cd submodule/tui-bridge
          WIN_CC=gcc ./build.sh
      - name: Verify binary
        run: |
          test -f bin/windows-x86_64/tui-bridge
          file bin/windows-x86_64/tui-bridge
          sha256sum bin/windows-x86_64/tui-bridge
      - uses: actions/upload-artifact@v4
        with:
          name: tui-bridge-windows-x86_64
          path: bin/windows-x86_64/tui-bridge
          if-no-files-found: error

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build (macOS arm64)
        run: |
          cd submodule/tui-bridge
          ./build.sh
      - name: Verify binary
        run: |
          test -f bin/macos-arm64/tui-bridge
          file bin/macos-arm64/tui-bridge
          shasum -a 256 bin/macos-arm64/tui-bridge
      - uses: actions/upload-artifact@v4
        with:
          name: tui-bridge-macos-arm64
          path: bin/macos-arm64/tui-bridge
          if-no-files-found: error

  commit:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: tui-bridge-windows-x86_64
          path: bin/windows-x86_64
      - uses: actions/download-artifact@v4
        with:
          name: tui-bridge-macos-arm64
          path: bin/macos-arm64
      - name: Commit rebuilt binaries
        run: |
          chmod +x bin/windows-x86_64/tui-bridge bin/macos-arm64/tui-bridge
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bin/windows-x86_64/tui-bridge bin/macos-arm64/tui-bridge
          if git diff --cached --quiet; then
            echo "No binary changes to commit."
            exit 0
          fi
          git commit -m "chore(tui-bridge): rebuild binaries via CI [skip ci]"
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected, rebasing on latest master (attempt ${attempt})..."
            git pull --rebase --autostash origin master
          done
          echo "Failed to push after retries." >&2
          exit 1
