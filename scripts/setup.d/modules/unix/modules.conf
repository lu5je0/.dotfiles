[zshrc]
link = zshrc -> ~/.zshrc

[nvim]
link = vim -> ~/.config/nvim

[ssh]
link = ssh/config -> ~/.ssh/config

[git]
link = git -> ~/.config/git

[maven]
desc = copy maven config (~/.m2/settings.xml)
script = maven-settings.sh
check_exists = ~/.m2/settings.xml

[hammerspoon]
link = hammerspoon -> ~/.hammerspoon

[termux]
desc = link termux config (~/.config/termux) + download Nerd Font
script = termux.sh
check = ~/.config/termux

[ideavimrc]
link = ideavimrc -> ~/.ideavimrc

[pip]
link = pip -> ~/.config/pip

[karabiner]
link = karabiner -> ~/.config/karabiner

[tmux]
link = tmux -> ~/.config/tmux

[ghostty]
link = ghostty -> ~/.config/ghostty

[wezterm]
link = wezterm -> ~/.config/wezterm

[alacritty]
desc = link alacritty config (~/.config/alacritty)
script = alacritty.sh
check = ~/.config/alacritty/alacritty.toml

[yazi]
link = yazi -> ~/.config/yazi

[kitty]
link = kitty -> ~/.config/kitty

[q-trash]
desc = link q-trash to ~/.local/bin
script = q-trash.sh
check = ~/.local/bin/q-trash

[rime]
desc = link rime-ice + custom config (~/.local/share/fcitx5/rime)
script = rime.sh
check = ~/.local/share/fcitx5/rime/cn_dicts

[hyprland]
link = wm/hypr -> ~/.config/hypr

[waybar]
link = wm/waybar -> ~/.config/waybar

[niri]
link = wm/niri -> ~/.config/niri

[quickshell]
link = wm/quickshell -> ~/.config/quickshell

[kwin-tilewindow]
desc = install KWin tilewindow script (kpackagetool6)
script = kwin-tilewindow.sh
check = ~/.local/share/kwin/scripts/tilewindow

[keyd]
desc = symlink keyd config to /etc/keyd/default.conf (needs sudo)
script = keyd.sh
check = /etc/keyd/default.conf
