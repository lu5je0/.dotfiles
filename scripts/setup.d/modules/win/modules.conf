# WIN_HOME is auto-detected from DOTFILES_DIR parent.

[wezterm]
desc = link WezTerm config (Windows side junction)
script = wezterm.sh
check = $WIN_HOME/.config/wezterm

[gitconfig]
desc = link gitconfig (Windows side symlink)
script = gitconfig.sh
check = $WIN_HOME/.gitconfig

[wslconfig]
desc = link wslconfig (Windows side symlink)
script = wslconfig.sh
check = $WIN_HOME/.wslconfig
