cursor_blink_interval 0
resize_in_steps yes
allow_remote_control yes
listen_on unix:/tmp/mykitty
# linux_display_server x11

# BEGIN_KITTY_FONTS
font_family      family='JetBrainsMonoNL Nerd Font Mono' postscript_name=JetBrainsMonoNLNFM-Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

include ${KITTY_OS}.conf
# font_features none
# placement_strategy top-left
enabled_layouts splits

tab_bar_style fade
tab_bar_edge top
tab_bar_background #2D2E33
active_tab_foreground #C0C6D0
active_tab_background #2D2E33
inactive_tab_foreground #778093
inactive_tab_background #212227

# tab_bar_style custom
# tab_title_max_length 8
# # tab_bar.py uses this value as both max and min (fixed width)
# tab_bar_min_tabs 1
# hide_window_decorations titlebar-only

pixel_scroll yes
momentum_scroll 0.96

# cursor_trail 1
# cursor_trail_decay 0 0.3

macos_titlebar_color dark
# macos_quit_when_last_window_closed yes

window_margin_width 0

include ~/.dotfiles/kitty/gruvbox_dark.conf

map command+n send_text all \033n
map shift+command+t new_os_window
# hide_window_decorations yes

remember_window_size  no

# 114x42
# 969/114=8.5
# 777/42=18.5
# 123x46 cell

# 4k
# initial_window_width  1046
# initial_window_height 834

initial_window_width  1021
initial_window_height 816

map ctrl+home resize_window reset

mouse_hide_wait 3.0

map ctrl+b>ctrl+b send_text all \x02
map ctrl+b>c new_tab
map alt+t new_tab_with_cwd
map ctrl+b>x close_window
map ctrl+b>n next_tab
map ctrl+b>p previous_tab
map ctrl+b>w select_tab
map ctrl+b>1 goto_tab 1
map ctrl+b>2 goto_tab 2
map ctrl+b>3 goto_tab 3
map ctrl+b>4 goto_tab 4
map ctrl+b>5 goto_tab 5
map ctrl+b>6 goto_tab 6
map ctrl+b>7 goto_tab 7
map ctrl+b>8 goto_tab 8
map ctrl+b>9 goto_tab 9
map ctrl+b>o next_window
map ctrl+b>ctrl+o next_window
map ctrl+b>q detach_window new-tab
map ctrl+b>shift+q detach_window
map ctrl+b>r load_config_file

map ctrl+b>% launch --location=split --cwd=current
# map ctrl+b>5 launch --location=split (moved to ctrl+b>% to avoid conflict with goto_tab)
map ctrl+b>m detach_window ask
map ctrl+b>h kitten hints --type path --alphabet qfjdkslaureitywovmcxzpq --program "-"
map ctrl+b>shift+h goto_tab 1
map ctrl+b>shift+l goto_tab -1
# map f1 launch --stdin-source=@screen_scrollback /opt/homebrew/bin/nvim
# map ctrl+b>" launch --location=split

# map shift+command+c new_tab
# map shift+command+x close_tab
# map shift+command+n next_tab
# map shift+command+d detach_window new-tab
# map shift+command+o next_window
# map shift+command+5 launch --location=split --cwd=current
# map shift+command+' launch --location=split --cwd=current

# osc52 读取clipboard无需确认
clipboard_control write-clipboard write-primary read-clipboard read-primary
